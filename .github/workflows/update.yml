name: Fetch and deploy

on:
  schedule:
    - cron: "17 * * * *"   # hourly, offset to dodge top-of-hour load
  workflow_dispatch: {}      # manual trigger for testing
  push:
    branches: [main]
    paths:                   # rebuild on code/config changes too
      - "src/**"
      - "templates/**"
      - "sources.yaml"
      - ".github/workflows/update.yml"

permissions:
  contents: write            # commit fetched data back to the repo
  pages: write               # deploy to Pages
  id-token: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python -m src.ingest

      - name: Build site
        run: python -m src.build

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update feeds ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Race-safe push: if another run pushed first, rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on origin/main..."
            git pull --rebase --autostash origin main || true
          done
          echo "::error::Could not push after 5 attempts."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
