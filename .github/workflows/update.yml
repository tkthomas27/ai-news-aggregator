name: Fetch and deploy

on:
  schedule:
    - cron: "17 * * * *"   # hourly, offset to dodge top-of-hour load
  workflow_dispatch: {}      # manual trigger for testing
  push:
    branches: [main]
    paths:                   # rebuild on code/config changes too
      - "src/**"
      - "templates/**"
      - "sources.yaml"
      - ".github/workflows/update.yml"

permissions:
  contents: write            # commit fetched data back to the repo
  pages: write               # deploy to Pages
  id-token: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python -m src.ingest

      - name: Build site
        run: python -m src.build

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update feeds ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
